spring.application.name=code-explainer-app

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration (H2 - embedded)
spring.datasource.url=jdbc:h2:mem:codeexplainerdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Groq Configuration
# Replace with your actual API key or set as environment variable
openai.api.key=${OPENAI_API_KEY:}
openai.api.model=llama-3.1-8b-instant
openai.api.url=https://api.groq.com/openai/v1/chat/completions
# Logging
logging.level.root=INFO
logging.level.com.codeexplainer=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
