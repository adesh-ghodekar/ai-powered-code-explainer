<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Powered Code Explainer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input[type="text"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            font-family: 'Courier New', monospace;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            min-height: 200px;
            resize: vertical;
            font-family: 'Courier New', monospace;
        }

        .checkbox-group {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            margin-bottom: 0;
            font-weight: 500;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            cursor: pointer;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: #f0f0f0;
            color: #333;
            margin-top: 10px;
        }

        button.secondary:hover {
            background: #e0e0e0;
        }

        button.danger {
            background: #ff6b6b;
        }

        .explanation-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            min-height: 80px;
            overflow-y: auto;
        }

        .complexity-box {
            background: #f0f7ff;
            border-left: 4px solid #764ba2;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.95em;
        }

        .optimized-code {
            background: #e8f5e9;
            border: 2px solid #4caf50;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            overflow-x: auto;
        }

        .optimized-code pre {
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .history-section {
            grid-column: 1 / -1;
        }

        .snippets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .snippet-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .snippet-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }

        .snippet-card h3 {
            color: #667eea;
            margin-bottom: 10px;
            word-break: break-word;
        }

        .snippet-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.9em;
            color: #666;
        }

        .language-badge {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .snippet-code {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 0.85em;
            max-height: 100px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
        }

        .snippet-explanation {
            font-size: 0.95em;
            line-height: 1.5;
            margin-bottom: 10px;
            color: #555;
        }

        .snippet-actions {
            display: flex;
            gap: 10px;
        }

        .snippet-actions button {
            flex: 1;
            padding: 8px;
            font-size: 0.9em;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }

        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
        }

        .close-modal {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close-modal:hover {
            color: #000;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-button {
            background: none;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
            color: #666;
            border-bottom: 3px solid transparent;
            width: auto;
        }

        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8em;
            }

            .snippets-grid {
                grid-template-columns: 1fr;
            }
        }

        .info-text {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }

        .code-highlight {
            background: #fff3cd;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 AI-Powered Code Explainer</h1>
            <p>Understand your code instantly with AI assistance</p>
        </header>

        <div class="main-content">
            <!-- Input Form -->
            <div class="card">
                <h2>📝 Submit Code</h2>
                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>

                <form id="explainForm">
                    <div class="form-group">
                        <label for="codeTitle">Code Title (Optional)</label>
                        <input type="text" id="codeTitle" placeholder="e.g., Bubble Sort Algorithm">
                    </div>

                    <div class="form-group">
                        <label for="language">Language</label>
                        <select id="language" required>
                            <option value="">Select Language</option>
                            <option value="python">Python</option>
                            <option value="javascript">JavaScript</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="code">Code Snippet</label>
                        <textarea id="code" placeholder="Paste your code here..." required></textarea>
                    </div>

                    <div class="checkbox-group">
                        <label>
                            <input type="checkbox" id="includeOptimization">
                            Include Optimization Suggestions
                        </label>
                        <label>
                            <input type="checkbox" id="includeComplexity">
                            Include Complexity Analysis
                        </label>
                    </div>

                    <button type="submit">Explain Code</button>
                </form>

                <div id="loading" class="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 15px;">Analyzing your code...</p>
                </div>
            </div>

            <!-- Result Display -->
            <div class="card">
                <h2>💡 Explanation</h2>
                <div id="resultContainer" style="display: none;">
                    <div class="tabs">
                        <button class="tab-button active" onclick="switchTab('explanation')">Explanation</button>
                        <button class="tab-button" id="complexityTab" onclick="switchTab('complexity')">Complexity</button>
                        <button class="tab-button" id="optimizationTab" onclick="switchTab('optimization')">Optimization</button>
                    </div>

                    <div id="explanation" class="tab-content active">
                        <div class="explanation-box" id="explanationText"></div>
                    </div>

                    <div id="complexity" class="tab-content">
                        <div class="complexity-box" id="complexityText"></div>
                    </div>

                    <div id="optimization" class="tab-content">
                        <div class="optimized-code" id="optimizationText" style="display: none;"></div>
                        <p id="optimizationNA" style="color: #999;">Optimization analysis not available</p>
                    </div>

                    <button class="secondary" onclick="saveAndShowAll()">View in History</button>
                </div>

                <div id="noResult" class="empty-state">
                    <p>📭 Submit code to see the explanation here</p>
                </div>
            </div>
        </div>

        <!-- History Section -->
        <div class="card history-section">
            <h2>📚 Code History</h2>
            <div id="historyContainer">
                <div class="empty-state">
                    <p>No code snippets yet. Submit your first snippet above!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeDetailModal()">&times;</span>
            <h2 id="modalTitle"></h2>
            
            <div class="tabs">
                <button class="tab-button active" onclick="switchModalTab('code')">Code</button>
                <button class="tab-button" onclick="switchModalTab('explanation')">Explanation</button>
                <button class="tab-button" id="modalComplexityTab" onclick="switchModalTab('complexity')">Complexity</button>
                <button class="tab-button" id="modalOptimizationTab" onclick="switchModalTab('optimization')">Optimization</button>
            </div>

            <div id="modalCode" class="tab-content active">
                <div class="snippet-code" id="modalCodeContent" style="max-height: 400px;"></div>
            </div>

            <div id="modalExplanation" class="tab-content">
                <div class="explanation-box" id="modalExplanationContent"></div>
            </div>

            <div id="modalComplexity" class="tab-content">
                <div class="complexity-box" id="modalComplexityContent"></div>
            </div>

            <div id="modalOptimization" class="tab-content">
                <div class="optimized-code" id="modalOptimizationContent"></div>
            </div>

            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button class="secondary" onclick="closeDetailModal()">Close</button>
                <button class="danger" id="deleteBtn" onclick="deleteCurrentSnippet()">Delete Snippet</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8080/api/code';
        let currentSnippetId = null;
        let allSnippets = [];

        // Form submission
        document.getElementById('explainForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const code = document.getElementById('code').value.trim();
            const language = document.getElementById('language').value;
            const title = document.getElementById('codeTitle').value;
            const includeOptimization = document.getElementById('includeOptimization').checked;
            const includeComplexity = document.getElementById('includeComplexity').checked;

            if (!code) {
                showError('Please enter some code');
                return;
            }

            if (!language) {
                showError('Please select a programming language');
                return;
            }

            showLoading(true);
            clearMessages();

            try {
                const response = await fetch(`${API_URL}/explain`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        code,
                        language,
                        title: title || 'Untitled',
                        includeOptimization,
                        includeComplexity
                    })
                });

                if (!response.ok) {
                    throw new Error('Failed to explain code');
                }

                const result = await response.json();
                displayResult(result);
                currentSnippetId = result.id;
                showSuccess('Code explained successfully!');
                loadSnippets();
            } catch (error) {
                showError('Error: ' + error.message);
            } finally {
                showLoading(false);
            }
        });

        function displayResult(data) {
            document.getElementById('noResult').style.display = 'none';
            document.getElementById('resultContainer').style.display = 'block';

            // Explanation
            document.getElementById('explanationText').innerHTML =
                formatAIResponse(data.explanation || 'No explanation available');

            // Complexity
            const complexityTab = document.getElementById('complexityTab');
            const complexityContent = document.getElementById('complexityText');
            if (data.complexity) {
                complexityTab.style.display = 'block';
                complexityContent.innerHTML = formatAIResponse(data.complexity);
            } else {
                complexityTab.style.display = 'none';
            }

            // Optimization
            const optimizationTab = document.getElementById('optimizationTab');
            const optimizationContent = document.getElementById('optimizationText');
            const optimizationNA = document.getElementById('optimizationNA');
            if (data.optimizedCode) {
                optimizationTab.style.display = 'block';
                optimizationContent.innerHTML = formatOptimization(data.optimizedCode);
                optimizationContent.style.display = 'block';
                optimizationNA.style.display = 'none';
            } else {
                optimizationTab.style.display = 'none';
            }
        }

        function formatAIResponse(text) {
            return text
                .replace(/\n/g, "<br>")
                .replace(/Explanation:/g, "<b>Explanation:</b>")
                .replace(/Functions:/g, "<b>Functions:</b>")
                .replace(/Loops:/g, "<b>Loops:</b>")
                .replace(/Conditions:/g, "<b>Conditions:</b>")
                .replace(/Variables:/g, "<b>Variables:</b>");
        }

        function formatOptimization(text) {
            return "<pre>" +
                escapeHtml(
                    text
                        .replace(/\*\*/g, "")
                        .replace(/```javascript/g, "")
                        .replace(/```/g, "")
                ) +
                "</pre>";
        }

        async function loadSnippets() {
            try {
                const response = await fetch(`${API_URL}/snippets`);
                if (!response.ok) throw new Error('Failed to load snippets');

                allSnippets = await response.json();
                renderSnippets();
            } catch (error) {
                console.error('Error loading snippets:', error);
            }
        }

        function renderSnippets() {
            const container = document.getElementById('historyContainer');

            if (allSnippets.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No code snippets yet. Submit your first snippet above!</p></div>';
                return;
            }

            container.innerHTML = '<div class="snippets-grid">' +
                allSnippets.map(snippet => `
                    <div class="snippet-card" onclick="showSnippetDetail(${snippet.id})">
                        <h3>${escapeHtml(snippet.title)}</h3>
                        <div class="snippet-meta">
                            <span class="language-badge">${snippet.language.toUpperCase()}</span>
                            <span>${new Date(snippet.createdAt).toLocaleDateString()}</span>
                        </div>
                        <div class="snippet-code">${escapeHtml(snippet.code.substring(0, 150))}${snippet.code.length > 150 ? '...' : ''}</div>
                        <div class="snippet-explanation">${snippet.explanation.substring(0, 100)}...</div>
                        <div class="snippet-actions">
                            <button class="secondary" onclick="event.stopPropagation(); editSnippet(${snippet.id})">Edit</button>
                            <button class="danger" onclick="event.stopPropagation(); deleteSnippet(${snippet.id})">Delete</button>
                        </div>
                    </div>
                `).join('') +
                '</div>';
        }

        function showSnippetDetail(id) {
            const snippet = allSnippets.find(s => s.id === id);
            if (!snippet) return;

            currentSnippetId = id;
            document.getElementById('modalTitle').textContent = snippet.title;

            // Code tab
            document.getElementById('modalCodeContent').textContent = snippet.code;

            // Explanation tab
            document.getElementById('modalExplanationContent').innerHTML = formatAIResponse(snippet.explanation);

            // Complexity tab
            const complexityTab = document.getElementById('modalComplexityTab');
            if (snippet.complexity) {
                complexityTab.style.display = 'block';
                document.getElementById('modalComplexityContent').textContent = snippet.complexity;
            } else {
                complexityTab.style.display = 'none';
            }

            // Optimization tab
            const optimizationTab = document.getElementById('modalOptimizationTab');
            if (snippet.optimizedCode) {
                optimizationTab.style.display = 'block';
                document.getElementById('modalOptimizationContent').innerHTML = `<pre>${escapeHtml(snippet.optimizedCode)}</pre>`;
            } else {
                optimizationTab.style.display = 'none';
            }

            document.getElementById('detailModal').style.display = 'block';
        }

        function closeDetailModal() {
            document.getElementById('detailModal').style.display = 'none';
            currentSnippetId = null;
        }

        async function deleteSnippet(id) {
            if (!confirm('Are you sure you want to delete this snippet?')) return;

            try {
                const response = await fetch(`${API_URL}/snippets/${id}`, {
                    method: 'DELETE'
                });

                if (!response.ok) throw new Error('Failed to delete');

                showSuccess('Snippet deleted successfully');
                loadSnippets();
            } catch (error) {
                showError('Error deleting snippet: ' + error.message);
            }
        }

        function deleteCurrentSnippet() {
            if (currentSnippetId) {
                deleteSnippet(currentSnippetId);
                closeDetailModal();
            }
        }

        function editSnippet(id) {
            const snippet = allSnippets.find(s => s.id === id);
            if (!snippet) return;

            document.getElementById('codeTitle').value = snippet.title;
            document.getElementById('language').value = snippet.language;
            document.getElementById('code').value = snippet.code;

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));

            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function switchModalTab(tabName) {
            document.querySelectorAll('#detailModal .tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('#detailModal .tab-button').forEach(el => el.classList.remove('active'));

            document.getElementById('modal' + tabName.charAt(0).toUpperCase() + tabName.slice(1)).classList.add('active');
            event.target.classList.add('active');
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function showError(message) {
            const el = document.getElementById('errorMessage');
            el.textContent = message;
            el.style.display = 'block';
        }

        function showSuccess(message) {
            const el = document.getElementById('successMessage');
            el.textContent = message;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        function clearMessages() {
            document.getElementById('errorMessage').style.display = 'none';
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function saveAndShowAll() {
            document.getElementById('historyContainer').scrollIntoView({ behavior: 'smooth' });
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('detailModal');
            if (event.target === modal) {
                closeDetailModal();
            }
        };

        // Load snippets on page load
        loadSnippets();
    </script>
</body>
</html>
